name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-13
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        run: swift --version

      - name: Build
        run: swift build -c release --arch arm64 --arch x86_64
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        
      - name: Package
        run: |
          BINARY_PATH=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          echo "Binary path: $BINARY_PATH"
          mkdir -p release_dist
          cp "$BINARY_PATH/PlasmaDemo" release_dist/
          # Create ZIP (flat)
          zip -j PlasmaDemo-macOS.zip release_dist/PlasmaDemo
          # Create DMG
          hdiutil create -volname "PlasmaDemo" -srcfolder release_dist -ov -format UDZO PlasmaDemo.dmg
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlasmaDemo-macOS
          if-no-files-found: error
          path: |
            PlasmaDemo-macOS.zip
            PlasmaDemo.dmg

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PlasmaDemo-macOS.zip
            PlasmaDemo.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
